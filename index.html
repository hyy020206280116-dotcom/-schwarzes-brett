<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第14帝國 非公式セリフアーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a08;
    --surface: #1a1410;
    --gold: #c8a96e;
    --gold-light: #e8c98e;
    --gold-dim: #6b5a3e;
    --text: #e8ddd0;
    --text-dim: #8a7a68;
    --red: #8b2020;
    --border: #3a2e22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Shippori Mincho', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,169,110,0.015) 2px, rgba(200,169,110,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  header { width: 100%; text-align: center; padding: 3rem 1rem 2rem; position: relative; z-index: 1; }
  .header-deco { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
  .header-line { height: 1px; width: 80px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .header-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .header-emblem { font-size: 1.2rem; color: var(--gold); letter-spacing: 0.3em; }

  h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-shadow: 0 0 40px rgba(200,169,110,0.3);
    margin-bottom: 0.3rem;
  }

  .subtitle { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.4em; text-transform: uppercase; }

  .filter-bar, .search-bar, .stage, .btn-area, .counter { width: 100%; max-width: 700px; padding: 0 1.5rem; margin-bottom: 2rem; position: relative; z-index: 1; }

  .filter-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.3em; margin-bottom: 0.6rem; }

  .filter-scroll { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0; padding: 0.35rem 0.9rem; border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font-family: 'Shippori Mincho', serif; font-size: 0.75rem;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.25s; white-space: nowrap; border-radius: 2px;
  }

  .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); }
  .filter-btn.active { border-color: var(--gold); color: var(--gold-light); background: rgba(200,169,110,0.08); }

  .card {
    background: var(--surface); border: 1px solid var(--border); padding: 3rem 2.5rem 2.5rem;
    position: relative; min-height: 260px; display: flex; flex-direction: column; justify-content: center;
  }

  .card::before, .card::after {
    content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--gold); border-style: solid;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .serifu-text {
    font-family: 'Noto Serif JP', serif; font-size: clamp(1.05rem, 3vw, 1.35rem);
    font-weight: 400; line-height: 2; color: var(--text); letter-spacing: 0.05em;
    margin-bottom: 2rem; opacity: 0; transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .serifu-text.visible { opacity: 1; transform: translateY(0); }

  .serifu-meta { display: flex; flex-direction: column; gap: 0.3rem; opacity: 0; transform: translateY(6px); transition: all 0.5s ease 0.15s; }
  .serifu-meta.visible { opacity: 1; transform: translateY(0); }

  .meta-chara { font-size: 0.85rem; color: var(--gold); letter-spacing: 0.15em; font-weight: 700; }
  .meta-source { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.15em; }

  .quote-mark {
    position: absolute; top: -3rem; left: -1rem; font-size: 8rem;
    color: rgba(200,169,110,0.04); font-family: serif; z-index: 0;
    pointer-events: none; user-select: none;
  }

  .btn-area { display: flex; gap: 1rem; justify-content: center; margin-bottom: 3rem; flex-wrap: wrap; }
  .btn-main {
    padding: 0.9rem 2.5rem; background: transparent; border: 1px solid var(--gold);
    color: var(--gold-light); font-family: 'Noto Serif JP', serif; font-size: 0.9rem;
    font-weight: 700; letter-spacing: 0.3em; cursor: pointer; position: relative; overflow: hidden;
    transition: color 0.3s;
  }
  .btn-main::before {
    content: ''; position: absolute; inset: 0; background: var(--gold);
    transform: translateX(-101%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index: -1;
  }
  .btn-main:hover::before { transform: translateX(0); }
  .btn-main:hover { color: var(--bg); }

  .search-bar { display: flex; gap: 0.7rem; }
  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 0.8rem 1rem; font-family: 'Shippori Mincho', serif; font-size: 0.85rem; outline: none;
  }
  .search-input:focus { border-color: var(--gold); }

  .search-btn {
    padding: 0 1.4rem; background: transparent; border: 1px solid var(--gold);
    color: var(--gold-light); font-family: 'Noto Serif JP', serif; font-size: 0.8rem;
    letter-spacing: 0.15em; cursor: pointer;
  }
  .search-btn:hover { background: var(--gold); color: var(--bg); }

  .counter { text-align: center; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.3em; margin-bottom: 4rem; }
  footer { margin-top: auto; padding: 1.5rem; text-align: center; font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.2em; opacity: 0.5; }
</style>
</head>
<body>

<header>
  <div class="header-deco">
    <div class="header-line"></div>
    <div class="header-emblem">✦</div>
    <div class="header-line right"></div>
  </div>
  <h1>第14帝國</h1>
  <div class="subtitle">非公式セリフアーカイブ</div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" class="search-input" placeholder="セリフ・キャラ名・出典で検索" />
  <button class="search-btn" onclick="runSearch()">検索</button>
</div>

<div class="filter-bar">
  <div class="filter-label">— キャラクターで絞り込む —</div>
  <div class="filter-scroll" id="filterScroll">
    <button class="filter-btn active" data-chara="all">すべて</button>
  </div>
</div>

<div class="stage">
  <div class="card">
    <div class="card-inner">
      <div class="quote-mark">"</div>
      <div class="serifu-text" id="serifuText"></div>
      <div class="serifu-meta" id="serifuMeta">
        <div class="meta-chara" id="metaChara"></div>
        <div class="meta-source" id="metaSource"></div>
      </div>
    </div>
  </div>
</div>

<div class="btn-area">
  <button class="btn-main" onclick="showRandom()">セリフを引く</button>
</div>

<div class="counter" id="counter"></div>

<footer>非公式アーカイブ ✦ 第14帝國</footer>

<script>
const rawData = `これは借しだ。大きな借しだからな。敵と味方に分かれることになっても、生きていればまた会うこともできよう。
（春木亮太朗大佐-vol.28 新作だよおっかさん -）

よくぞ、あの戦火の中を…。
（秋山祐少佐-vol.20 3年B組楠本先生-）

現在敵は北門に持ちうる全ての兵力にて展開中。その数１０万に対し我が方は城内に5千。かかる総攻撃に対し城門を固く閉ざし、兵力の被害を最小限に抑えたとしても、一時間以内にこの城は落城いたします。
（春木亮太朗大佐-Vol.11 元帥のミッキーマウス -）

捕まったら逃げればいいんです。おとなしく捕まってる人間は犯罪者です。
（楠本先生-vol.20 ３年B組楠本先生-）

私の命令は・・・柊生元帥の命令と心得よ・・・！
（加納友緒中佐-vol.15 忍者でござる-）

きしめんパイ、うなぎパイ、なごやん、小倉&ネオマーガリン
（藤原是親少佐-Vol.11 元帥のミッキーマウス -）

君たち軍人は死ぬのも仕事のうちかもしれないが、帝國臣民のことを思えば軽々しく死んでよい存在ではなかろう！
（パン屋のPちゃん-vol.16 お魚になった元帥-）

柊生元帥の夢を見ていた…
（定光寺輝信中将-Vol.11 元帥のミッキーマウス -）

しかし、どうか帝國のことをお考え下さい。
（加納友緒中佐-vol.25 となりの元帥-）

時は民主制に移行している。だから逆をいくまでだ。
（楠本柊生-vol.17のび太の第14帝國-）

この私でも予想できたことを、柊生元帥が見過ごすことが有り得ようか。
（定光寺輝信中将-vol.6 ○〇のいない日-）

おはようか。「よい朝」だ。
（楠本柊生帝國元帥-vol.10 元帥UFOにのる-）

悪いが、お前の役目はもう終わったんだ。
（春木亮太朗大佐-vol.16 お魚になった元帥-）

８時４６分です。
（じょうこうじくん５5号-vol.23 元帥の中日×巨人戦-）

貴官ら一旦出撃するからには、敵地が焦土と化すまで戦い抜くんだ！
（定光寺輝信中将-Vol.19 元帥のドンとやってみよう-）

そうか、そうであったな。供に行くか
（草薙護大佐-vol.9 元帥ハリウッドに行く-）

リッターのみなさんこんばんは！
（定光寺輝信中将-オールナイト１４-）

臣民諸君…もし仮になどという言葉は我が帝國には存在しない。しかしもし仮にという状況は日々無数に存在している。その中を常に我々は諸君らとともに歩み続けているのだ。
（楠本柊生帝國元帥-vol.16 お魚になった元帥-）

その10年間でこの男が起こした奇跡に比べれば、今が夜であろうと、太陽を出すぐらい構うまい！聞いているのか！！
この男を生き返らせろ…生き返らせろ！生き返らせろ！！！！
（定光寺輝信中将-vol.15 忍者でござる-）

ささしまライブ駅と掛けまして、高級美容液と解きます。その心は、どちらも一駅（一液）でいいでしょう。くすっちです！
（楠本柊生帝國元帥-ライヒスリッターExpo〜お魚になった忍者でござる・忍者編〜-）

春木大佐は汗っかきです！！
（風間利之少佐-vol.16 お魚になった元帥-）

それがどうしたんですか！！！
（定光寺輝信中将-vol.8 元帥とドラえもん-）

ガビーン…
（有馬竜ノ介大尉-vol.16 お魚になった元帥-）

柊生元帥！…柊生元帥がそう仰られるなら、地獄の底までお供いたします。
（定光寺輝信中将-vol.25 となりの元帥-）

定光寺中将！あまりにも犠牲が大き過ぎました…。
（春木亮太朗大佐-Vol.21 8時だョ！全員元帥！ -）

我々は軍人だ。貴族でなければ官僚でもない。力のみでここまでのし上がってきた。私の言うことを不服と思えば、その力をもって私を倒すがよかろう！
（楠本柊生帝國元帥-vol.10 元帥UFOにのる-）

貴官らは各公國の最高司令官、昔であれば各国の王に他ならん。
（楠本柊生帝國元帥-vol.25 となりの元帥-）

馬鹿か貴官は！
（定光寺輝信中将-vol.16 お魚になった元帥-）

さぁ～なにして遊ぶ？
（あきお兄ちゃん-vol.25 となりの元帥-）

すごいだろう。兄ちゃんが見つけたんだぞ。
（はるお兄ちゃん-vol.25 となりの元帥-）

これぞ、血の団結だ！
（楠本柊生帝國元帥-vol.８ 元帥とドラえもん -）

うわ～。これすごいよ兄ちゃん。
（天ちん-vol.25 となりの元帥-）`;

// （以降は元のJavaScriptコードと同じ）
function parseData(raw) {
  const blocks = raw.trim().split(/\n\n+/);
  const result = [];
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    const metaLine = lines.find(l => l.startsWith('（'));
    const textLines = lines.filter(l => !l.startsWith('（'));
    if (!metaLine || textLines.length === 0) continue;
    const text = textLines.join('\n').trim();
    const inner = metaLine.replace(/^（/, '').replace(/）$/, '').trim();
    const dashIdx = inner.indexOf('-');
    let chara = inner, source = '';
    if (dashIdx !== -1) {
      chara = inner.slice(0, dashIdx).trim();
      source = inner.slice(dashIdx + 1).trim();
    }
    result.push({ text, chara, source });
  }
  return result;
}

let allSerifu = parseData(rawData);
let filtered = [...allSerifu];
let currentFilter = 'all';
let current = null;

function buildFilters() {
  const scroll = document.getElementById('filterScroll');
  const charas = [...new Set(allSerifu.map(s => s.chara))].sort();
  charas.forEach(chara => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.chara = chara;
    btn.textContent = chara;
    btn.onclick = () => setFilter(chara);
    scroll.appendChild(btn);
  });
}

function setFilter(chara) {
  currentFilter = chara;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.chara === chara));
  runSearch();
}

function updateCounter() {
  document.getElementById('counter').textContent = `${filtered.length} 件のセリフ`;
}

function normalizeText(str) {
  return str.toLowerCase().normalize('NFKC').replace(/\s+/g, '').replace(/[ァ-ヶ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0x60));
}

function runSearch() {
  const keyword = normalizeText(document.getElementById('searchInput').value.trim());
  let base = currentFilter === 'all' ? [...allSerifu] : allSerifu.filter(s => s.chara === currentFilter);

  if (!keyword) {
    filtered = base;
  } else {
    const words = keyword.split(/\s+/).filter(Boolean);
    filtered = base.map(s => {
      const text = normalizeText(s.text);
      const chara = normalizeText(s.chara);
      const source = normalizeText(s.source);
      let score = 0;
      words.forEach(w => {
        if (text.includes(w)) score += 3;
        if (chara.includes(w)) score += 5;
        if (source.includes(w)) score += 2;
      });
      return { ...s, score };
    }).filter(s => s.score > 0).sort((a, b) => b.score - a.score);
  }

  updateCounter();
  if (filtered.length > 0) showSerifu(filtered[0]);
  else {
    document.getElementById('serifuText').textContent = '該当するセリフがありません';
    document.getElementById('metaChara').textContent = '';
    document.getElementById('metaSource').textContent = '';
  }
}

function showSerifu(data) {
  current = data;
  const textEl = document.getElementById('serifuText');
  const metaEl = document.getElementById('serifuMeta');
  textEl.classList.remove('visible');
  metaEl.classList.remove('visible');
  setTimeout(() => {
    textEl.textContent = data.text;
    document.getElementById('metaChara').textContent = data.chara;
    document.getElementById('metaSource').textContent = data.source;
    requestAnimationFrame(() => {
      textEl.classList.add('visible');
      metaEl.classList.add('visible');
    });
  }, 150);
}

function showRandom() {
  if (filtered.length === 0) return;
  let candidates = filtered.filter(s => s !== current);
  if (candidates.length === 0) candidates = filtered;
  const picked = candidates[Math.floor(Math.random() * candidates.length)];
  showSerifu(picked);
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

buildFilters();
updateCounter();
showSerifu(filtered[0]);
</script>
</body>
</html>
